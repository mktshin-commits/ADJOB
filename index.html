<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdJob Curation - 광고 대행사 채용 정보</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="top-nav">
        <div class="logo">AdJob <span>Curation</span></div>
        <div class="nav-tabs">
            <button class="tab-btn active" data-target="feedView">채용 공고 피드</button>
            <button class="tab-btn" data-target="tableView">회원사 구인구직 현황</button>
        </div>
        <div class="user-actions">
            <button class="login-btn">로그인</button>
        </div>
    </header>

    <!-- View 1: Job Feed -->
    <div class="container view-section active-view" id="feedView">
        <aside class="sidebar">


            <div class="filter-group">
                <h3>게시 기간</h3>
                <select id="dateFilter">
                    <option value="all">전체</option>
                    <option value="1" selected>최근 1개월</option>
                    <option value="2">최근 2개월</option>
                    <option value="3">최근 3개월</option>
                    <option value="6">최근 6개월</option>
                    <option value="12">최근 1년</option>
                </select>
            </div>

            <div class="filter-group">
                <h3>검색</h3>
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="회사명 또는 키워드...">
                </div>
            </div>

            <div class="filter-group">
                <h3>경력 조건</h3>
                <label><input type="checkbox" value="신입" class="filter-exp"> 신입</label>
                <label><input type="checkbox" value="경력" class="filter-exp"> 경력 (1~2년)</label>
                <label><input type="checkbox" value="경력 3년 이상" class="filter-exp"> 경력 3년 이상</label>
            </div>

            <div class="filter-group">
                <h3>소속 협회</h3>
                <label><input type="checkbox" id="kodaaFilter"> ✨ 인증 회원사만 보기</label>
            </div>
            
            <div class="filter-group">
                <h3>근무 지역</h3>
                <select id="locationFilter">
                    <option value="">전체 지역</option>
                    <option value="서울">서울 전체</option>
                    <option value="강남구">강남구</option>
                    <option value="서초구">서초구</option>
                    <option value="마포구">마포구</option>
                    <option value="용산구">용산구</option>
                </select>
            </div>
        </aside>

        <main class="main-feed">
            <!-- 상단 직무별 퀵 탭 (Job Category Tabs) -->
            <div class="quick-tabs-wrapper">
                <div class="chip-container" id="techStackFilter">
                    <button class="chip active" data-value="">전체</button>
                    <button class="chip" data-value="기획/전략">기획/전략</button>
                    <button class="chip" data-value="크리에이티브">크리에이티브</button>
                    <button class="chip" data-value="퍼포먼스">퍼포먼스</button>
                    <button class="chip" data-value="소셜/콘텐츠">소셜/콘텐츠</button>
                    <button class="chip" data-value="테크/AI">테크/AI</button>
                </div>
            </div>

            <div class="feed-header">
                <span class="result-count">현재 공고 총 <span id="count">0</span>건</span>
                <select id="sortFilter">
                    <option value="latest">최신 등록순</option>
                    <option value="deadline">마감 임박순</option>
                </select>
            </div>
            <div class="job-list" id="jobList">
                <!-- Job Cards will be generated here by JS -->
            </div>
        </main>
    </div>

    <!-- View 2: Member Status Table -->
    <div class="container view-section hidden" id="tableView">
        <div class="table-container">
            <div class="table-header">
                <h2>KODA 회원사 구인구직 현황</h2>
                <p>한국디지털광고협회 회원사의 실시간 채용 진행 상황입니다.</p>
            </div>
            <table class="status-table">
                <thead>
                    <tr>
                        <th width="8%">No.</th>
                        <th width="30%">회원사명</th>
                        <th width="20%">진행 중인 공고 수</th>
                        <th width="22%">채용 상태</th>
                        <th width="20%">바로가기</th>
                    </tr>
                </thead>
                <tbody id="memberTableBody">
                    <!-- Table rows generated by JS -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Detail Modal -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal-content">
            <button class="close-btn" id="closeModal">&times;</button>
            <div id="modalBody">
                <!-- Modal details will be populated here -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
